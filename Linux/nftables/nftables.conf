#!/usr/sbin/nft -f
# Configuración nftables - laptop de desarrollo
# Uso: Docker + libvirt + SMB + DLNA + MiniDLNA
#
# NOTAS IMPORTANTES:
#
# 1. destroy table inet filter (NO flush ruleset, NO flush table)
#    - flush ruleset borra TODAS las tablas incluyendo las de Docker y libvirt
#    - flush table falla si la tabla no existe (ej: primer boot) → exit 1
#    - destroy table elimina la tabla si existe, sin error si no existe → boot seguro
#
# 2. iifname / oifname en lugar de iif / oif para docker0
#    - iif/oif resuelven la interfaz por índice numérico al momento de cargar
#    - Si docker0 no existe aún (boot temprano), nft falla con exit 1
#    - iifname/oifname hacen match por nombre en tiempo de ejecución → boot seguro

destroy table inet filter

table inet filter {
    chain input {
        type filter hook input priority 0;
        policy drop;
        ct state established,related accept
        iif "lo" accept
        tcp dport 22 accept      # SSH
        tcp dport 80 accept      # HTTP local
        tcp dport 443 accept     # HTTPS local
        tcp dport 445 accept     # SMB (SMB sobre TCP)
        tcp dport 139 accept     # SMB sobre NetBIOS (Windows antiguos)
        udp dport 137 accept     # NetBIOS Name Service
        udp dport 138 accept     # NetBIOS Datagram Service
        udp dport 1900 accept    # DLNA SSDP (descubrimiento UPnP)
        tcp dport 8200 accept    # MiniDLNA
    }
    chain forward {
        type filter hook forward priority 0;
        policy drop;
        ct state established,related accept
        iifname "docker0" accept
        oifname "docker0" accept
        # Redes bridge personalizadas de Docker (br-xxxxxxxx)
        iifname "br-*" accept
        oifname "br-*" accept
    }
    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}
